<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ImagineArt · Spin &amp; Win — Revamp</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wheel.jsx"></script>
<script type="text/babel" src="variant-a.jsx"></script>
<script type="text/babel" src="variant-b.jsx"></script>
<script type="text/babel" src="variant-c.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  // W for large-format wheel screens, S for smaller screens
  const W = 980, S = 560, H = 680;

  const variants = [
    { id: 'A', name: 'A · Editorial', sub: 'Serif display, restrained color, negative space' },
    { id: 'B', name: 'B · Swiss Index', sub: 'Hard grid, all-caps sans, no gradients' },
    { id: 'C', name: 'C · Aurora Glass', sub: 'Refined take on the current direction' },
  ];

  return (
    <DesignCanvas>
      <DCSection id="email" title="01 · Email entry" subtitle="First contact — email gate before the single spin">
        <DCArtboard id="a-email" label="A · Editorial" width={W} height={H}><window.VA_Email /></DCArtboard>
        <DCArtboard id="b-email" label="B · Swiss Index" width={W} height={H}><window.VB_Email /></DCArtboard>
        <DCArtboard id="c-email" label="C · Aurora Glass" width={S} height={H}><window.VC_Email /></DCArtboard>
      </DCSection>

      <DCSection id="spin" title="02 · Spin screen (ready)" subtitle="Wheel + prize index, awaiting the tap">
        <DCArtboard id="a-spin" label="A · Editorial" width={W} height={H}><window.VA_Spin stage="ready" /></DCArtboard>
        <DCArtboard id="b-spin" label="B · Swiss Index" width={W} height={H}><window.VB_Spin stage="ready" /></DCArtboard>
        <DCArtboard id="c-spin" label="C · Aurora Glass" width={S} height={H}><window.VC_Spin stage="ready" /></DCArtboard>
      </DCSection>

      <DCSection id="spinning" title="03 · Spinning" subtitle="Mid-animation state">
        <DCArtboard id="a-spinning" label="A · Editorial" width={W} height={H}><window.VA_Spin stage="spinning" /></DCArtboard>
        <DCArtboard id="b-spinning" label="B · Swiss Index" width={W} height={H}><window.VB_Spin stage="spinning" /></DCArtboard>
        <DCArtboard id="c-spinning" label="C · Aurora Glass" width={S} height={H}><window.VC_Spin stage="spinning" /></DCArtboard>
      </DCSection>

      <DCSection id="win" title="04 · Win (result modal)" subtitle="Big reveal — prize, code, claim path">
        <DCArtboard id="a-win" label="A · Editorial" width={W} height={H}><window.VA_Win /></DCArtboard>
        <DCArtboard id="b-win" label="B · Swiss Index" width={W} height={H}><window.VB_Win /></DCArtboard>
        <DCArtboard id="c-win" label="C · Aurora Glass" width={S} height={H}><window.VC_Win /></DCArtboard>
      </DCSection>

      <DCSection id="cons" title="05 · Consolation" subtitle="All slots claimed / better luck next time">
        <DCArtboard id="a-cons" label="A · Editorial" width={W} height={H}><window.VA_Consolation /></DCArtboard>
        <DCArtboard id="b-cons" label="B · Swiss Index" width={W} height={H}><window.VB_Consolation /></DCArtboard>
        <DCArtboard id="c-cons" label="C · Aurora Glass" width={S} height={H}><window.VC_Consolation /></DCArtboard>
      </DCSection>

      <DCSection id="err" title="06 · Error state" subtitle="Email rejected / network fail">
        <DCArtboard id="a-err" label="A · Editorial" width={W} height={H}><window.VA_Error /></DCArtboard>
        <DCArtboard id="b-err" label="B · Swiss Index" width={W} height={H}><window.VB_Error /></DCArtboard>
        <DCArtboard id="c-err" label="C · Aurora Glass" width={S} height={H}><window.VC_Error /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
